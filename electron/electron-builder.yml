appId: com.chatwithgeogebra.app
productName: ChatWithGeoGebra
directories:
  output: release
files:
  - electron/**/*
  - package.json
extraResources:
  - from: .next/standalone/package.json
    to: standalone/package.json
  - from: .next/standalone/server.js
    to: standalone/server.js
  - from: .next/standalone/.next
    to: standalone/.next
  - from: .next/standalone/node_modules
    to: standalone/node_modules
  - from: .next/static
    to: standalone/.next/static
  - from: public/GeoGebra
    to: standalone/public/GeoGebra
npmRebuild: false
win:
  target:
    - target: portable
      arch:
        - x64
