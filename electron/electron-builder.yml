appId: com.chatwithgeogebra.app
productName: ChatWithGeoGebra
directories:
  output: release
files:
  - electron/**/*
  - package.json
extraResources:
  - from: .next/standalone
    to: standalone
    filter:
      - "**/*"
  - from: .next/static
    to: standalone/.next/static
    filter:
      - "**/*"
  - from: public/GeoGebra
    to: standalone/public/GeoGebra
    filter:
      - "**/*"
npmRebuild: false
win:
  target: portable
